<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Datasheet Renderer V2.1 - Geometry Pass</title>
  <style>
    :root{
      --card-w: 1800px;
      --card-h: 1200px;
      --paper: #ece9df;
      --ink: #171717;
      --muted-ink: #333;
      --banner: rgb(12,52,85);
      --frame: rgb(75,98,98);
      --text: rgb(75,98,98);
      --black: #101619;
      --cream: #f5f2e6;
      --rule: rgba(20,20,20,.75);
      --warn: #b00020;
      --conduit-stack: "Conduit ITC", "ConduitITC", "Bahnschrift Condensed", "Aptos Narrow", "Arial Narrow", Arial, Helvetica, sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:#202020;
      font-family: var(--conduit-stack);
      padding:24px;
      color:var(--ink);
    }

    .toolbar{
      max-width: min(96vw, var(--card-w));
      margin:0 auto 16px auto;
      color:#ddd;
      font: 14px Arial, sans-serif;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
    }

    .toolbar button{
      border:1px solid #777;
      background:#333;
      color:#fff;
      padding:8px 12px;
      border-radius:4px;
      cursor:pointer;
    }

    #app{
      width:min(96vw, var(--card-w));
      margin:0 auto;
    }

    .datasheet-card{
      width:100%;
      aspect-ratio:3/2;
      background:var(--paper);
      position:relative;
      overflow:hidden;
      box-shadow:0 12px 40px rgba(0,0,0,.45);
      border:5px solid var(--frame);
      container-type:inline-size;
    }

    .card-bg{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.22), transparent 25%),
        linear-gradient(90deg, rgba(0,0,0,.04), transparent 18%, transparent 82%, rgba(0,0,0,.08)),
        var(--paper);
    }

    .art-zone{
      position:absolute;
      left:0;
      top:0;
      right:0;
      height:var(--content-top, 26.0%);
      overflow:hidden;
      background:
        linear-gradient(90deg, rgba(0,0,0,.9), rgba(0,0,0,.65) 42%, rgba(0,0,0,.25) 70%, rgba(0,0,0,.05)),
        linear-gradient(135deg, #111, #3a3a3a 60%, #181818);
    }

    .header-content{
      position:absolute;
      left:2.55%;
      top:3.2%;
      width:78.2%;
      z-index:3;
      color:white;
      transform-origin:top left;
      transform:scale(var(--header-scale, 1));
    }

    .top-banner{
      position:absolute;
      left:2.55%;
      top:3.2%;
      width:78.2%;
      height:clamp(58px, 7.15cqw, 126px);
      background:var(--banner);
      clip-path: polygon(0 0, 100% 0, 100% 57%, 66% 57%, 61.2% 100%, 0 100%);
      z-index:0;
      pointer-events:none;
    }

    .unit-title{
      position:relative;
      z-index:1;
      font-family: var(--conduit-stack);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.035em;
      line-height:.95;
      font-size: clamp(22px, 2.95cqw, 54px);
      white-space:nowrap;
      width:max-content;
      max-width:90%;
      padding:clamp(8px, 1.05cqw, 19px) clamp(10px, 1.4cqw, 25px) 0;
    }

    .unit-title .subtitle{
      font-size:.55em;
      font-style:italic;
      letter-spacing:.01em;
      margin-left:.25em;
      text-transform:none;
    }

    .stats-area{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns: repeat(6, minmax(0, 1fr)) auto;
      column-gap:2.1%;
      row-gap:2.4%;
      width:39.4%;
      align-items:start;
      margin-left:clamp(10px, 1.4cqw, 25px);
      margin-top:clamp(4px, .42cqw, 8px);
    }
    .stats-area.multi-profile{
      width:79.3%;
      grid-template-columns: repeat(6, minmax(0, 1fr)) minmax(18cqw, 34cqw);
      column-gap:.75%;
      row-gap:.42cqw;
    }

    .profile-row{ display:contents; }

    .stat-cell{
      text-align:center;
      min-width:0;
      --stat-value-font: clamp(26px, 2.55vw, 42px);
    }
    .stat-label{
      font-family: var(--conduit-stack);
      height:22px;
      color:#fff;
      font-weight:900;
      line-height:1;
      font-size: clamp(19px, 1.44cqw, 26px);
      text-transform:uppercase;
    }
    .stat-box{
      font-family: var(--conduit-stack);
      width:100%;
      aspect-ratio:1.03/.86;
      min-height:0;
      background:var(--cream);
      border: clamp(2px, .21cqw, 4px) solid var(--frame);
      clip-path: polygon(0 0, 86% 0, 100% 15%, 100% 80%, 80% 100%, 0 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      color:var(--text);
      font-weight:900;
      font-size: var(--stat-value-font);
      line-height:1;
    }
    .profile-name{
      color:#fff;
      font-weight:900;
      text-transform:uppercase;
      white-space:normal;
      align-self:center;
      padding-left:.8em;
      padding-bottom:0;
      font-size:clamp(11px, .95cqw, 18px);
      line-height:1.05;
      text-shadow:0 1px 2px rgba(0,0,0,.7);
      max-width:100%;
    }

    .stats-area.multi-profile .stat-label{
      font-size:clamp(13px,1.05cqw,19px);
    }

    .stats-area.multi-profile .stat-cell{
      --stat-value-font: clamp(22px,2.1cqw,38px);
    }

    .stats-area.multi-profile .stat-box{
      font-size:var(--stat-value-font);
    }

    .stats-area.multi-profile .profile-name{
      font-size: calc(1.25 * clamp(14px,1.18cqw,22px));
      align-self:start;
      padding-left:.6em;
      /* Keep the profile name aligned with the stat-box row, not centered across
         the combined stat + invulnerable-save callout height. */
      margin-top:clamp(34px, 3.25cqw, 59px);
    }

    .stat-cell.stat-sv{
      position:relative;
    }

    .invuln-wrap{
      margin-top:.22cqw;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      gap:.68cqw;
      width:100%;
      max-width:none;
      text-align:left;
      z-index:10;
    }

    .invuln-shield{
      position:relative;
      flex:0 0 auto;
      width:100%;
      max-width:none;
      min-width:32px;
      aspect-ratio:1 / 1.12;
      background:var(--cream);
      color:var(--text);
      clip-path:polygon(0 0,100% 0,100% 57%,50% 100%,0 57%);
    }

    .invuln-value{
      position:absolute;
      left:50%;
      top:34%;
      transform:translate(-50%, -50%);
      font-weight:900;
      font-size:var(--stat-value-font);
      line-height:1;
    }

    .invuln-right{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      min-width:0;
    }

    .invuln-label{
      background:var(--frame);
      color:white;
      font-weight:900;
      text-transform:uppercase;
      margin:0;
      padding:.675em 1.08em .60em .99em;
      font-size:clamp(15px,1.23cqw,22.5px);
      line-height:1;
      white-space:nowrap;
    }

    .invuln-comment{
      margin-top:.18em;
      margin-left:1.05em;
      color:#fff;
      font-size:clamp(12px,1.02cqw,18px);
      font-style:italic;
      white-space:nowrap;
      text-shadow:0 1px 2px rgba(0,0,0,.8);
    }

    .main-frame{
      position:absolute;
      left:0;
      right:0;
      top:var(--content-top, 26.0%);
      bottom:9.35%;
      display:grid;
      grid-template-columns: 61.7% 38.3%;
      border-top:3px solid var(--frame);
      z-index: 2;
    }
    .col{
      overflow:hidden;
      padding-top:1.45%;
      padding-bottom:1.2%;
    }
    .left-col{
      padding-left:2.35%;
      padding-right:2.0%;
      border-right:4px solid var(--frame);
    }
    .right-col{
      padding-left:2.0%;
      padding-right:2.25%;
    }

    .weapon-table-wrap{ margin-bottom:2.05%; }
    table.weapon-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      font-size:var(--weapon-font, clamp(16px,1.42cqw,26px));
      line-height:var(--weapon-line, 1.08);
    }
    .weapon-table col.name{ width:57.5%; }
    .weapon-table col.range{ width:10.5%; }
    .weapon-table col.a{ width:6.7%; }
    .weapon-table col.hit{ width:7.3%; }
    .weapon-table col.s{ width:6.3%; }
    .weapon-table col.ap{ width:6.2%; }
    .weapon-table col.d{ width:5.5%; }

    .weapon-table thead th{
      background:var(--frame);
      color:white;
      font-weight:900;
      text-transform:uppercase;
      font-family: var(--conduit-stack);
      font-size: clamp(14px, 1.22vw, 21px);
      line-height:1;
      padding:.54em .22em .46em;
      text-align:center;
    }
    .weapon-table thead th:first-child{
      text-align:left;
      padding-left:8.6%;
      letter-spacing:.015em;
    }
    .weapon-table tbody td{
      padding:var(--weapon-row-pad-y, .50em) .25em calc(var(--weapon-row-pad-y, .50em) - .07em);
      text-align:center;
      vertical-align:top;
      border-bottom:2px dotted var(--rule);
      font-weight:500;
      font-size:1.12em;
    }
    .weapon-table tbody td:first-child{
      text-align:left;
      padding-left:8.6%;
      padding-right:.6em;
    }
    .weapon-name{ font-weight:600; }
    .weapon-keywords{
      color:var(--text);
      font-weight:900;
      text-transform:uppercase;
      font-size:.72em;
      letter-spacing:.015em;
      white-space:normal;
    }

    .section{ margin-bottom:2.0%; }
    .section-heading{
      background:var(--frame);
      color:#fff;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.02em;
      font-family: var(--conduit-stack);
      font-size:var(--section-head-font, clamp(18px,1.75cqw,32px));
      line-height:1;
      padding:.43em .7em .38em;
    }
    .section-body{
      font-size: var(--ability-font, clamp(18px, 1.52cqw, 28px));
      line-height:var(--ability-line, 1.22);
      padding:.70em .52em .56em .52em;
      border-bottom:2px dotted var(--rule);
    }
    .meta-line{ margin-bottom:.55em; }
    .meta-line .label{ font-weight:400; }
    .meta-line .value{ font-weight:900; }
    .ability-item{ margin-bottom:var(--ability-gap, .82em); }
    .ability-item:last-child{ margin-bottom:0; }
    .ability-title{ font-weight:900; }
    .content-block p{ display:inline; margin:0; }
    .content-block ul, .content-block ol{
      margin:.35em 0 .4em 1.35em;
      padding:0;
    }
    .content-block li{ margin-bottom:.16em; }
    .content-list{ margin:.35em 0 .4em 1.35em; padding:0; }
    .content-table{ width:100%; border-collapse:collapse; margin:.35em 0; }
    .content-table td{ padding:.08em .5em .08em 0; vertical-align:top; }
    .subrule-title{ font-weight:900; text-transform:uppercase; margin:.55em 0 .08em; }
    .kwb, .kwb2{ font-weight:900; text-transform:uppercase; }
    .bluefont{ color:var(--text); font-weight:900; }

    .footer{
      position:absolute;
      left:2.35%;
      right:2.35%;
      bottom:1.8%;
      height:7.85%;
      display:grid;
      grid-template-columns: 61.7% 38.3%;
      border:4px solid var(--frame);
      background:var(--paper);
      z-index:8;
    }
    .footer:after{
      content:"";
      position:absolute;
      left:61.7%;
      top:50%;
      width:28px;
      height:28px;
      transform:translate(-50%, -50%) rotate(45deg);
      border:4px solid var(--frame);
      background:var(--paper);
    }
    .keyword-box{
      padding:.45em 1em;
      text-transform:uppercase;
      font-size: var(--footer-font, clamp(15px, 1.28cqw, 24px));
      line-height:1.08;
      overflow:hidden;
      display:flex;
      align-items:center;        /* vertical center */
      justify-content:flex-start;/* horizontal left */
      text-align:left;
    }

    .faction-box{
      padding:.45em 1em .45em 1.55em;
      text-transform:uppercase;
      font-size: var(--footer-font, clamp(17px, 1.48cqw, 28px));
      line-height:1.08;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      background:#0d1719;
      color:#fff;
    }
    .footer-label{ font-weight:400; }
    .footer-value{ font-weight:900; }

    .fit-badge{
      position:absolute;
      right:.5%;
      bottom:.3%;
      font:12px Arial,sans-serif;
      color:#fff;
      background:rgba(0,0,0,.55);
      padding:3px 5px;
      display:none;
      z-index:20;
    }
    .datasheet-card.has-overflow .fit-badge{
      display:block;
      background:var(--warn);
    }

    @media print{
      body{ background:white; padding:0; }
      .toolbar{ display:none; }
      #app{ width:6in; margin:0; }
      .datasheet-card{ width:6in; height:4in; box-shadow:none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>Datasheet Renderer V2 — Milestone 1. Fixed 3:2 frame, content-complete schema render.</div>
    <button onclick="window.print()">Print / Save PDF</button>
  </div>
  <div id="app"></div>

  <script src="./waha_content_render_utils.js"></script>
  <script>
    const sampleCard = {
      "name": "Roboute Guilliman",
      "profiles": [{
        "name": "Roboute Guilliman",
        "stats": { "M": "8\"", "T": "9", "Sv": "2+", "W": "10", "Ld": "5+", "OC": "4" },
        "invulnerable_save": "4+",
        "invulnerable_save_comment": ""
      }],
      "weapons": [
        { "type": "ranged", "name": "Hand of Dominion", "keywords": ["rapid fire 2"], "range": "30\"", "A": "2", "BS": "2+", "S": "6", "AP": "-2", "D": "2" },
        { "type": "melee", "name": "Emperor’s Sword", "keywords": ["devastating wounds"], "range": "Melee", "A": "14", "WS": "2+", "S": "8", "AP": "-3", "D": "2" },
        { "type": "melee", "name": "Hand of Dominion", "keywords": ["lethal hits"], "range": "Melee", "A": "7", "WS": "2+", "S": "14", "AP": "-4", "D": "4" }
      ],
      "sections": [
        {
          "title": "AUTHOR OF THE CODEX",
          "core": [],
          "faction": [],
          "items": [
            { "title": "Primarch of the XIII (Aura)", "content": [{ "displayItem": "p", "text": "While a friendly ADEPTUS ASTARTES unit is within 6\" of this model, add 1 to the Objective Control characteristic of models in that unit and you can re-roll Battle-shock and Leadership tests taken for that unit." }] },
            { "title": "Master of Battle", "content": [{ "displayItem": "p", "text": "At the start of your Command phase, after you have selected your Oath of Moment target, select a second enemy unit. Until the start of your next Command phase, if your Oath of Moment target is destroyed, that second enemy unit becomes your Oath of Moment target until you select a new one." }] },
            { "title": "Supreme Strategist", "content": [{ "displayItem": "p", "text": "Once per battle round, one unit from your army with this ability can use it when a friendly ADEPTUS ASTARTES unit within 12\" of that model is targeted with a Stratagem. If it does, reduce the CP cost of that usage of that Stratagem by 1CP." }] }
          ]
        },
        {
          "title": "ABILITIES",
          "core": [],
          "faction": ["Oath of Moment"],
          "items": [
            { "title": "Author of the Codex", "content": [{ "displayItem": "p", "text": "At the Start of your Command phase, select two Author of the Codex abilities (see left). Until the start of your next Command phase, this model has those abilities." }] },
            { "title": "Ultramarines Bodyguard", "content": [{ "displayItem": "p", "text": "While this model is within 3\" of one or more friendly ADEPTUS ASTARTES INFANTRY units, this model has the Lone Operative ability." }] },
            { "title": "Armour of Fate", "content": [{ "displayItem": "p", "text": "The first time this model is destroyed, roll one D6 at the end of the phase: on a 3+, set this model back up on the battlefield as close as possible to where it was destroyed and not within Engagement Range of any enemy models, with 6 wounds remaining." }] }
          ]
        },
        {
          "title": "SUPREME COMMANDER",
          "core": [],
          "faction": [],
          "items": [{ "content": [{ "displayItem": "p", "text": "If this model is in your army, it must be your Warlord." }] }]
        }
      ],
      "keywords": [{ "applies_to": null, "keywords": ["MONSTER", "CHARACTER", "EPIC HERO", "IMPERIUM", "PRIMARCH", "ROBOUTE GUILLIMAN"] }],
      "faction_keywords": ["ADEPTUS ASTARTES", "ULTRAMARINES"],
      "theme": { "banner": "rgb(12, 52, 85)", "background": "rgb(75, 98, 98)", "text": "rgb(75, 98, 98)", "frame": "rgb(75, 98, 98)" }
    };

    function renderCard(card){
      const root = document.createElement('article');
      root.className = 'datasheet-card';
      const hasMultiProfile = (card.profiles || []).length > 1;
      const hasInvuln = (card.profiles || []).some(p => p.invulnerable_save);

      root.classList.toggle('has-multi-profile', hasMultiProfile);
      root.classList.toggle('has-invuln', hasInvuln);
      root.style.setProperty('--banner', card.theme?.banner || 'rgb(12,52,85)');
      root.style.setProperty('--frame', card.theme?.frame || card.theme?.background || 'rgb(75,98,98)');
      root.style.setProperty('--text', card.theme?.text || card.theme?.background || 'rgb(75,98,98)');

      const sections = Array.isArray(card.sections) ? card.sections : [];
      const abilitiesIndex = sections.findIndex(s => norm(s.title) === 'ABILITIES');
      const leftSections = abilitiesIndex >= 0 ? sections.slice(0, abilitiesIndex) : sections;
      const rightSections = abilitiesIndex >= 0 ? sections.slice(abilitiesIndex) : [];
      const ranged = (card.weapons || []).filter(w => norm(w.type) === 'RANGED');
      const melee = (card.weapons || []).filter(w => norm(w.type) === 'MELEE');

      root.innerHTML = `
        <div class="card-bg"></div>
        <div class="art-zone">
          <div class="top-banner"></div>
          <div class="header-content">
            <div class="unit-title">${renderTitle(card.name)}</div>
            ${renderProfiles(card.profiles || [])}
          </div>
        </div>
        <main class="main-frame">
          <section class="col left-col">
            ${renderWeaponTable(ranged, 'RANGED WEAPONS', 'BS')}
            ${renderWeaponTable(melee, 'MELEE WEAPONS', 'WS')}
            ${leftSections.map(renderSection).join('')}
          </section>
          <section class="col right-col">
            ${rightSections.map(renderSection).join('')}
          </section>
        </main>
        <footer class="footer">
          <div class="keyword-box">${renderKeywordGroups(card.keywords || [])}</div>
          <div class="faction-box">
            <div class="footer-label">FACTION KEYWORDS:</div>
            <div class="footer-value">${esc((card.faction_keywords || []).join(', '))}</div>
          </div>
        </footer>
        <div class="fit-badge">OVERFLOW</div>
      `;

      requestAnimationFrame(() => fitCard(root));
      return root;
    }

    function renderTitle(name){
      const text = String(name || '');
      const m = text.match(/^(.*?)\s+(with\s+.+)$/i);
      if(!m) return esc(text);
      return `${esc(m[1])}<span class="subtitle">${esc(m[2])}</span>`;
    }

    function renderProfiles(profiles){
      const labels = ['M','T','Sv','W','Ld','OC'];
      const safeProfiles = profiles.length ? profiles : [{ name:'', stats:{} }];
      const multi = safeProfiles.length > 1;

      return `<div class="stats-area ${multi ? 'multi-profile' : ''}">
        ${safeProfiles.map(p => `
          <div class="profile-row">
            ${labels.map(label => `
              <div class="stat-cell stat-${label.toLowerCase()}">
                <div class="stat-label">${esc(label)}</div>
                <div class="stat-box">${esc(p.stats?.[label] ?? '')}</div>
                ${label === 'Sv' ? renderProfileInvuln(p) : ''}
              </div>
            `).join('')}
            ${multi ? `<div class="profile-name">${esc(p.name || '')}</div>` : `<div></div>`}
          </div>
        `).join('')}
      </div>`;
    }

    function renderProfileInvuln(profile){
      const save = String(profile.invulnerable_save || '').trim();
      if(!save) return '';

      const comment = String(profile.invulnerable_save_comment || '').trim();

      return `
        <div class="invuln-wrap">
          <div class="invuln-shield">
            <span class="invuln-value">${esc(save)}</span>
          </div>
          <div class="invuln-right">
            <div class="invuln-label">Invulnerable Save</div>
            ${comment ? `<div class="invuln-comment">${esc(comment)}</div>` : ''}
          </div>
        </div>
      `;
    }

    function renderWeaponTable(weapons, title, hitKey){
      if(!weapons.length) return '';
      return `<div class="weapon-table-wrap"><table class="weapon-table">
        <colgroup><col class="name"><col class="range"><col class="a"><col class="hit"><col class="s"><col class="ap"><col class="d"></colgroup>
        <thead><tr><th>${esc(title)}</th><th>RANGE</th><th>A</th><th>${esc(hitKey)}</th><th>S</th><th>AP</th><th>D</th></tr></thead>
        <tbody>${weapons.map(w => `<tr><td>${renderWeaponName(w)}</td><td>${esc(w.range)}</td><td>${esc(w.A)}</td><td>${esc(w[hitKey])}</td><td>${esc(w.S)}</td><td>${esc(w.AP)}</td><td>${esc(w.D)}</td></tr>`).join('')}</tbody>
      </table></div>`;
    }

    function renderWeaponName(w){
      const keywords = Array.isArray(w.keywords) ? w.keywords : [];
      if(!keywords.length) return `<span class="weapon-name">${esc(w.name)}</span>`;
      return `<span class="weapon-name">${esc(w.name)}</span> <span class="weapon-keywords">[${esc(keywords.map(k => String(k).toUpperCase()).join(', '))}]</span>`;
    }

    function renderSection(section){
      return `<section class="section"><div class="section-heading">${esc(section.title || '')}</div><div class="section-body">
        ${renderMeta('CORE', section.core)}
        ${renderMeta('FACTION', section.faction)}
        ${(section.items || []).map(renderAbilityItem).join('')}
      </div></section>`;
    }

    function renderMeta(label, arr){
      if(!Array.isArray(arr) || !arr.length) return '';
      return `<div class="meta-line"><span class="label">${esc(label)}:</span> <span class="value">${esc(arr.join(', '))}</span></div>`;
    }

    function renderAbilityItem(item){
      return `<div class="ability-item">${item.title ? `<span class="ability-title">${esc(item.title)}:</span> ` : ''}<span class="content-block">${(item.content || []).map(blockHtml).join('')}</span></div>`;
    }

    function renderKeywordGroups(groups){
      if(!groups.length) return '';

      if(groups.length === 1 && !groups[0].applies_to){
        return `<span><span class="footer-label">KEYWORDS:</span> <span class="footer-value">${esc((groups[0].keywords || []).join(', '))}</span></span>`;
      }

      return `<span>${groups.map((g, i) => {
        const label = g.applies_to
          ? String(g.applies_to).replace(/\s+ONLY$/i, '')
          : 'KEYWORDS';

        const prefix = i === 0
          ? `KEYWORDS - ${label}:`
          : ` | ${label}:`;

        return `<span class="footer-label">${esc(prefix)}</span> <span class="footer-value">${esc((g.keywords || []).join(', '))}</span>`;
      }).join('')}</span>`;
    }

    function fitCard(card){
      const left = card.querySelector('.left-col');
      const right = card.querySelector('.right-col');
      const footerBoxes = [...card.querySelectorAll('.keyword-box,.faction-box')];
      const header = card.querySelector('.art-zone');
      const title = card.querySelector('.unit-title');
      const headerContent = card.querySelector('.header-content');
      const stats = card.querySelector('.stats-area');
      const topBanner = card.querySelector('.top-banner');
      const isMulti = card.classList.contains('has-multi-profile');

      let contentTop = 26.0;
      let headerScale = 1;
      const maxContentTop = isMulti ? 46.0 : 34.0;
      const minContentTop = isMulti ? 26.0 : 26.0;
      const headerBottomMargin = isMulti ? 6 : 18;

      const setContentTop = value => {
        contentTop = Math.max(minContentTop, Math.min(maxContentTop, value));
        card.style.setProperty('--content-top', `${contentTop}%`);
      };

      const setHeaderScale = value => {
        headerScale = Math.max(0.72, Math.min(1, value));
        card.style.setProperty('--header-scale', headerScale);
      };

      const profileContentBottom = () => {
        if(!header) return 0;
        const h = header.getBoundingClientRect();
        const visibleParts = [
          ...header.querySelectorAll('.stat-cell, .profile-name, .invuln-wrap')
        ];
        if(!visibleParts.length) return 0;
        return Math.max(...visibleParts.map(el => el.getBoundingClientRect().bottom - h.top));
      };

      const plaqueBottom = () => {
        if(!topBanner || !header) return 0;
        const h = header.getBoundingClientRect();
        return topBanner.getBoundingClientRect().bottom - h.top;
      };

      const requiredContentTop = () => {
        const cardRect = card.getBoundingClientRect();
        const neededPx = Math.max(profileContentBottom(), plaqueBottom()) + headerBottomMargin;
        return (neededPx / cardRect.height) * 100;
      };

      const leftOverflows = () => left.scrollHeight > left.clientHeight + 1;
      const rightOverflows = () => right.scrollHeight > right.clientHeight + 1;
      const footerOverflows = () => footerBoxes.some(x => x.scrollHeight > x.clientHeight + 1 || x.scrollWidth > x.clientWidth + 1);
      const titleOverflows = () => title && headerContent && title.scrollWidth > headerContent.clientWidth + 1;
      const headerOverflows = () => profileContentBottom() > header.clientHeight + 1;
      
      const shrinkColumns = iteration => {
        const abilityFont = Math.max(0.74, 1 - iteration * 0.023);
        const weaponFont = Math.max(0.66, 1 - iteration * 0.024);
        card.style.setProperty('--ability-font', `calc(${abilityFont} * clamp(17px,1.46cqw,27px))`);
        card.style.setProperty('--ability-line', Math.max(1.08, 1.225 - iteration * 0.008));
        card.style.setProperty('--ability-gap', `${Math.max(.34, .68 - iteration * .018)}em`);
        card.style.setProperty('--weapon-font', `calc(${weaponFont} * clamp(16px,1.42cqw,26px))`);
        card.style.setProperty('--weapon-row-pad-y', `${Math.max(.22, .50 - iteration * .018)}em`);
        card.style.setProperty('--weapon-line', Math.max(0.92, 1.08 - iteration * 0.006));
      };

      const shrinkFooter = iteration => {
        const footerFont = Math.max(0.88, 1 - iteration * 0.014);
        card.style.setProperty('--footer-font', `calc(${footerFont} * clamp(16px,1.38cqw,26px))`);
      };

      setHeaderScale(1);
      setContentTop(minContentTop);

      // First spend vertical space on the upper banner.  This keeps the title,
      // stats and shields as large as possible, and only scales them down after
      // the banner has reached its cap and the columns cannot give up more room.
      for(let i=0;i<44;i++){
        setContentTop(requiredContentTop());

        if((leftOverflows() || rightOverflows()) && i < 34){
          shrinkColumns(i + 1);
          continue;
        }

        if(footerOverflows()) shrinkFooter(i + 1);

        if((headerOverflows() || titleOverflows()) && contentTop >= maxContentTop - 0.05){
          setHeaderScale(1 - (i + 1) * 0.014);
          setContentTop(requiredContentTop());
          continue;
        }

        if(!leftOverflows() && !rightOverflows() && !footerOverflows() && !titleOverflows() && !headerOverflows()){
          break;
        }

        // If columns still overflow even after some column compaction, very
        // gradually reduce the header content. This is intentionally last.
        if((leftOverflows() || rightOverflows()) && i >= 34){
          setHeaderScale(1 - (i - 33) * 0.014);
          setContentTop(requiredContentTop());
        }
      }

      // Final pass: keep the expanded banner that is required by the current
      // visible header content. Do not trim it below the standard top section;
      // otherwise multi-profile cards appear to "solve" by shrinking the banner
      // instead of preserving the profile/stat scale.
      setContentTop(requiredContentTop());

      const final = {
        left: leftOverflows(),
        right: rightOverflows(),
        footer: footerOverflows(),
        title: titleOverflows(),
        header: headerOverflows()
      };
      const overflow = final.left || final.right || final.footer || final.title || final.header;
      card.classList.toggle('has-overflow', overflow);
      if(overflow){
        console.warn('Datasheet overflow after fitting:', final, card);
      } else {
        console.info('Datasheet fit OK');
      }
    }

    function norm(v){ return String(v || '').trim().toUpperCase(); }
    function esc(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
    let allCards = {};
    let currentCard = null;
    

    async function loadCards() {
      const response = await fetch('./units.json');

      const text = await response.text();

      allCards = JSON.parse(text);
      buildCardSelector(allCards);
    }

    let cardIndex = [];

    function buildCardSelector(data) {
      const toolbar = document.querySelector('.toolbar');
      cardIndex = [];

      for (const [factionName, faction] of Object.entries(data)) {
        addCards(factionName, 'None', faction);

        for (const [subFactionName, subFaction] of Object.entries(faction)) {
          if (subFactionName === 'unit_cards') continue;
          if (subFaction && typeof subFaction === 'object' && subFaction.unit_cards) {
            addCards(factionName, subFactionName, subFaction);
          }
        }
      }

      function addCards(factionName, subFactionName, factionObj) {
        for (const [unitName, card] of Object.entries(factionObj.unit_cards || {})) {
          cardIndex.push({ factionName, subFactionName, unitName, card });
        }
      }

      toolbar.innerHTML = `
        <select id="faction-primary"></select>
        <select id="sub-faction-select"></select>
        <select id="unit-select"></select>
        <button onclick="window.print()">Print / Save PDF</button>
      `;

      const primary = document.getElementById('faction-primary');
      const subFaction = document.getElementById('sub-faction-select');
      const unit = document.getElementById('unit-select');

      const factionValues = [...new Set(cardIndex.map(x => x.factionName))].sort();

      primary.innerHTML = factionValues
        .map(v => `<option value="${esc(v)}">${esc(v)}</option>`)
        .join('');

      primary.addEventListener('change', updateSubFactions);
      subFaction.addEventListener('change', updateUnits);
      unit.addEventListener('change', renderChosenUnit);

      updateSubFactions();

      function updateSubFactions() {
        const factionName = primary.value;
        const matches = cardIndex.filter(x => x.factionName === factionName);

        const subFactionValues = [...new Set(matches.map(x => x.subFactionName))].sort((a, b) => {
          if (a === 'None') return -1;
          if (b === 'None') return 1;
          return a.localeCompare(b);
        });

        subFaction.innerHTML = subFactionValues
          .map(v => `<option value="${esc(v)}">${esc(v)}</option>`)
          .join('');

        subFaction.hidden = subFactionValues.length <= 1 && subFactionValues[0] === 'None';

        updateUnits();
      }

      function updateUnits() {
        const factionName = primary.value;
        const subFactionName = subFaction.value || 'None';

        const matches = cardIndex.filter(x =>
          x.factionName === factionName &&
          x.subFactionName === subFactionName
        );

        unit.innerHTML = matches
          .sort((a, b) => a.unitName.localeCompare(b.unitName))
          .map((x, i) => `<option value="${i}">${esc(x.unitName)}</option>`)
          .join('');

        unit._matches = matches;
        renderChosenUnit();
      }

      function renderChosenUnit() {
        const selected = unit._matches?.[Number(unit.value)];
        if (!selected) return;

        currentCard = selected.card;

        const app = document.getElementById('app');
        app.innerHTML = '';
        app.appendChild(renderCard(selected.card));
      }
    }

    function renderSelectedCard(factionName, unitName, subFactionName = 'None') {
      const faction = allCards[factionName];
      const source = subFactionName === 'None' ? faction : faction?.[subFactionName];
      const card = source?.unit_cards?.[unitName];

      if (!card) return;

      currentCard = card;

      const app = document.getElementById('app');
      app.innerHTML = '';
      app.appendChild(renderCard(card));
    }

    loadCards();
  </script>
</body>
</html>
